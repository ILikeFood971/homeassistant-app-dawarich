# Prefer IPv4 over IPv6 for outbound connections.
#
# Cloudflare-fronted geocoders (e.g. api.geoapify.com) publish AAAA records.
# On networks that advertise IPv6 but have no working egress, Ruby's geocoder
# (Net::HTTP) connects to the dead IPv6 address first and fails every job with
# Geocoder::NetworkError, while curl's Happy Eyeballs silently falls back to
# IPv4 (so curl and the startup healthcheck appear fine). Raising the precedence
# of IPv4-mapped addresses makes glibc getaddrinfo -- and therefore Ruby --
# return IPv4 first. IPv6 is only reordered, not removed, so IPv6-only setups
# still work.
#
# NOTE: per man gai.conf, the presence of a single precedence line causes the
# default table to NOT be used. The full default precedence table is therefore
# restated below, with only the IPv4-mapped entry changed (10 -> 100).
precedence  ::1/128       50
precedence  ::/0          40
precedence  2002::/16     30
precedence  ::/96         20
precedence  ::ffff:0:0/96 100
